# This workflow will build a golang project and create releases
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
    
      - name: Install keepassxc-cli
        run: sudo apt-get update && sudo apt-get install -y keepassxc

      - name: Build
        run: go build

      - name: Test
        run: go test ./...

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
      - name: Build with GoReleaser (no publish)
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: build --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts for scanning
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          retention-days: 1

  virus-scan:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/
      
      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo systemctl stop clamav-freshclam
          sudo freshclam
          sudo systemctl start clamav-daemon
          # Wait for daemon to start
          sleep 10
      
      - name: Scan release artifacts
        run: |
          echo "Scanning release artifacts for viruses..."
          
          clamscan --recursive --verbose --infected --bell dist/
          scan_result=$?
          
          if [ $scan_result -eq 0 ]; then
            echo "✅ All artifacts are clean - no viruses detected"
          elif [ $scan_result -eq 1 ]; then
            echo "❌ Virus detected in artifacts!"
            exit 1
          else
            echo "⚠️ Scanner error occurred"
            exit 1
          fi
      
      - name: Upload clean artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scanned-artifacts
          path: dist/
          retention-days: 1

  publish-release:
    needs: virus-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Download scanned artifacts
        uses: actions/download-artifact@v4
        with:
          name: scanned-artifacts
          path: dist/
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create release with scanned artifacts
        run: |
          # Create the release with only the tar.gz files
          gh release create ${{ steps.version.outputs.VERSION }} \
            --title "Release ${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            $(find dist/ -name "*.tar.gz" | tr '\n' ' ')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-versioned-docs:
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install MkDocs and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mike
          
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          
      - name: Create versioned MkDocs config
        run: |
          bash .github/scripts/create-versioned-mkdocs-config.sh ${{ steps.version.outputs.VERSION }}
          
      - name: Configure Git for mike
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"
          
      - name: Deploy versioned docs
        run: |
          # Deploy the new version to gh-pages branch
          mike deploy --push ${{ steps.version.outputs.VERSION }} --title "${{ steps.version.outputs.VERSION }}" --update-aliases
          # Set this release as the new default (latest stable)
          mike set-default --push ${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
